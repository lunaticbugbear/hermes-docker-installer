name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing v* tag to publish or republish'
        required: true

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Build release notes and publish assets
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0

      - name: Prepare release assets
        run: |
          mkdir -p dist
          cp install.sh dist/install.sh
          cp install.ps1 dist/install.ps1
          cp uninstall.sh dist/uninstall.sh
          cp uninstall.ps1 dist/uninstall.ps1
          cp README.md LICENSE CHANGELOG.md SECURITY.md SUPPORT.md dist/
          (cd dist && sha256sum install.sh install.ps1 uninstall.sh uninstall.ps1 README.md LICENSE CHANGELOG.md SECURITY.md SUPPORT.md > SHA256SUMS)
          syft dir:dist -o spdx-json=dist/sbom.spdx.json

      - name: Generate release notes body
        run: |
          {
            echo "## HADES release"
            echo
            echo "### Included files"
            echo "- install.sh"
            echo "- install.ps1"
            echo "- uninstall.sh"
            echo "- uninstall.ps1"
            echo "- SHA256SUMS"
            echo "- sbom.spdx.json"
            echo
            echo "### Verification"
            echo '```bash'
            echo 'sha256sum -c SHA256SUMS'
            echo '```'
            echo
            echo 'GitHub artifact provenance attestation is published for the shipped installer asset.'
          } > RELEASE_NOTES.md

      - name: Generate provenance attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: dist/install.sh

      - name: Generate SBOM attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: dist/install.sh
          sbom-path: dist/sbom.spdx.json

      - name: Publish GitHub release
        run: |
          TAG="${TAG_NAME}"
          case "$TAG" in
            v*) ;;
            *) echo "Refusing to publish non-v* tag name: $TAG"; exit 1 ;;
          esac
          FILES=(
            dist/install.sh
            dist/install.ps1
            dist/uninstall.sh
            dist/uninstall.ps1
            dist/README.md
            dist/LICENSE
            dist/CHANGELOG.md
            dist/SECURITY.md
            dist/SUPPORT.md
            dist/SHA256SUMS
            dist/sbom.spdx.json
          )

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG" --notes-file RELEASE_NOTES.md
            gh release upload "$TAG" "${FILES[@]}" --clobber
          else
            gh release create "$TAG" "${FILES[@]}" --title "$TAG" --notes-file RELEASE_NOTES.md
          fi

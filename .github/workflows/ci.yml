name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shell:
    name: Shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Bash syntax
        run: |
          bash -n install.sh
          bash -n uninstall.sh
      - name: ShellCheck
        run: shellcheck -x install.sh uninstall.sh
      - name: Uninstall mode does not bootstrap Docker
        run: |
          HERMES_NONINTERACTIVE=1 bash install.sh --uninstall --dir "$RUNNER_TEMP/not-installed"
          bash uninstall.sh --help >/dev/null

  powershell:
    name: PowerShell scripts
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $errors = $null
          [System.Management.Automation.PSParser]::Tokenize((Get-Content -Raw .\install.ps1), [ref]$errors) | Out-Null
          if ($errors) { $errors | Format-List; exit 1 }
          $errors = $null
          [System.Management.Automation.PSParser]::Tokenize((Get-Content -Raw .\uninstall.ps1), [ref]$errors) | Out-Null
          if ($errors) { $errors | Format-List; exit 1 }

  generated-compose:
    name: Generated Docker Compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Generate files without build
        run: |
          HERMES_NONINTERACTIVE=1 OPENROUTER_API_KEY=dummy-token-123456789 bash install.sh --skip-build --force --dir "$RUNNER_TEMP/hades-ci"
      - name: Validate compose config
        working-directory: ${{ runner.temp }}/hades-ci
        run: docker compose config
      - name: Check generated helper syntax
        working-directory: ${{ runner.temp }}/hades-ci
        run: |
          bash -n bootstrap.sh
          bash -n healthcheck.sh
          bash -n bin/hades
      - name: Assert browser is opt-in by default
        working-directory: ${{ runner.temp }}/hades-ci
        run: grep -q '^INSTALL_BROWSER=0$' .env
      - name: Assert version pin is generated
        working-directory: ${{ runner.temp }}/hades-ci
        run: grep -q '^HERMES_VERSION=' .env

  docs:
    name: Docs sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Required files exist
        run: |
          test -f README.md
          test -f CHANGELOG.md
          test -f LICENSE
          test -f SECURITY.md
          test -f SUPPORT.md
          test -f CODE_OF_CONDUCT.md
          test -f CONTRIBUTING.md
          test -f docs/ARCHITECTURE.md
          test -f docs/OPERATIONS.md
          test -f docs/RELEASE_PROCESS.md
          test -f docs/RELEASE_VERIFICATION.md
          test -f ROADMAP.md
          test -f MAINTAINERS.md
          test -f .editorconfig
          test -f .github/CODEOWNERS
          test -f .github/dependabot.yml
          test -f .github/workflows/release.yml
          test -f .github/workflows/repo-hygiene.yml
          test -f .github/ISSUE_TEMPLATE/bug_report.md
          test -f .github/ISSUE_TEMPLATE/feature_request.md
          test -f .github/ISSUE_TEMPLATE/config.yml
          test -f .github/PULL_REQUEST_TEMPLATE/default.md
          test -f .github/FUNDING.yml
          test -f install.sh
          test -f install.ps1
          test -f uninstall.sh
          test -f uninstall.ps1
          test -f assets/README.md
          test -f assets/social-preview.png
          test -f assets/social-preview.svg
          test -f assets/generate_social_preview.py
      - name: No stale installer flags in docs/CI
        run: |
          if grep -R -- '--no-browser' README.md CHANGELOG.md install.sh install.ps1; then
            echo 'Found stale --no-browser flag; use --browser opt-in instead.'
            exit 1
          fi
      - name: Public install URLs are present
        run: |
          grep -q 'raw.githubusercontent.com/lunaticbugbear/hades-hermes-agent/main/install.sh' README.md
          grep -q 'raw.githubusercontent.com/lunaticbugbear/hades-hermes-agent/main/install.ps1' README.md
      - name: Core docs are linked from README
        run: |
          grep -q '## CI pipeline' README.md
          grep -q '## Docs' README.md
          grep -q 'docs/ARCHITECTURE.md' README.md
          grep -q 'docs/OPERATIONS.md' README.md
          grep -q 'docs/RELEASE_PROCESS.md' README.md
          grep -q 'docs/RELEASE_VERIFICATION.md' README.md
          grep -q 'ROADMAP.md' README.md
          grep -q 'MAINTAINERS.md' README.md
          grep -q 'SECURITY.md' README.md
          grep -q 'SUPPORT.md' README.md
      - name: Release trust docs match workflow
        run: |
          grep -q 'id-token: write' .github/workflows/release.yml
          grep -q 'attestations: write' .github/workflows/release.yml
          grep -q 'sbom.spdx.json' .github/workflows/release.yml
          grep -q 'actions/attest@v4' .github/workflows/release.yml
          grep -q 'sha256sum -c SHA256SUMS' docs/RELEASE_VERIFICATION.md
          grep -q 'SBOM' docs/RELEASE_VERIFICATION.md
          grep -q 'attestation' docs/RELEASE_VERIFICATION.md
      - name: No trust overclaims
        run: |
          if grep -R -iE 'signed release|SLSA compliant|tamper-proof' README.md docs SECURITY.md SUPPORT.md CHANGELOG.md; then
            echo 'Found release/security overclaim wording.'
            exit 1
          fi
          if grep -R -iE 'bug-free|malware-free' README.md docs SECURITY.md SUPPORT.md CHANGELOG.md | grep -v -E 'not as a claim|Do not treat' ; then
            echo 'Found unsafe absolute safety claim wording.'
            exit 1
          fi
          if grep -R -iE 'reproducible image builds' README.md docs SECURITY.md SUPPORT.md; then
            echo 'Found unsupported reproducibility claim in public docs.'
            exit 1
          fi
          if grep -R -iE 'secure install' README.md docs SECURITY.md SUPPORT.md CHANGELOG.md; then
            echo 'Found vague secure-install wording.'
            exit 1
          fi

  smoke:
    name: Docker build + smoke test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Generate files
        run: |
          HERMES_NONINTERACTIVE=1 OPENROUTER_API_KEY=dummy-token-123456789 bash install.sh --skip-build --force --dir "$RUNNER_TEMP/hermes-smoke"
      - name: Build Docker image
        working-directory: ${{ runner.temp }}/hermes-smoke
        run: docker compose build --progress=plain
      - name: Start container
        working-directory: ${{ runner.temp }}/hermes-smoke
        run: |
          docker compose up -d
          docker compose ps
      - name: Healthcheck wait
        run: |
          echo "Waiting for Hermes API..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8642/health >/dev/null 2>&1; then
              echo "API is healthy"
              curl -s http://localhost:8642/health
              exit 0
            fi
            echo "  attempt $i/30..."
            sleep 4
          done
          echo "Healthcheck failed after 120s"
          docker compose -f "$RUNNER_TEMP/hermes-smoke/docker-compose.yml" logs --tail 120 hermes || true
          exit 1
      - name: Cleanup
        if: always()
        working-directory: ${{ runner.temp }}/hermes-smoke
        run: docker compose down -v 2>/dev/null || true

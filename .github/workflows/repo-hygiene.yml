name: repo-hygiene

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Ensure no secrets-like example values are committed
        run: |
          if grep -RInE '(sk-[A-Za-z0-9]{16,}|AIza[0-9A-Za-z_-]{20,}|ghp_[A-Za-z0-9]{20,})' . \
            --exclude-dir=.git \
            --exclude=SHA256SUMS; then
            echo 'Potential real secret detected in repository contents.'
            exit 1
          fi
      - name: Ensure generated runtime files are not committed
        run: |
          test ! -f Dockerfile
          test ! -f docker-compose.yml
          test ! -f bootstrap.sh
          test ! -f healthcheck.sh
          test ! -f bin/omnipod
          test ! -f bin/omnipod.ps1
          test ! -f bin/omnipod.cmd

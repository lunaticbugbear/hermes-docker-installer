name: hermes-upstream-check

on:
  schedule:
    - cron: "37 8 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: hermes-upstream-bump
  cancel-in-progress: false

jobs:
  check:
    name: Check upstream Hermes release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Get latest upstream tag
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh api repos/NousResearch/hermes-agent/tags --jq '.[0].name')
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Get current pin
        id: current
        run: |
          CURRENT=$(grep -oP 'HERMES_VERSION="\$\{HERMES_VERSION:-\K[^}]+' install.sh)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

      - name: Open or update tracking issue
        if: steps.upstream.outputs.latest != steps.current.outputs.current
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OLD: ${{ steps.current.outputs.current }}
          NEW: ${{ steps.upstream.outputs.latest }}
        run: |
          TITLE="chore: bump Hermes pin to $NEW"
          BODY=$(printf 'Upstream Hermes released `%s` while HADES pins `%s`.\n\nUpdate `HERMES_VERSION` in `install.sh` and `install.ps1`, then validate and cut a release.\n\nUpstream release: https://github.com/NousResearch/hermes-agent/releases/tag/%s' "$NEW" "$OLD" "$NEW")
          EXISTING=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "$TITLE in:title" --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "Tracking issue already open: #$EXISTING"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$TITLE" --body "$BODY" --label dependencies
          fi

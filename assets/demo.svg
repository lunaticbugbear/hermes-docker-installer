<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <style>
    .bg { fill: #0d1117; }
    .text { font-family: 'Cascadia Code', 'Fira Code', 'Courier New', monospace; font-size: 14px; fill: #c9d1d9; }
    .cmd { fill: #58a6ff; font-weight: bold; }
    .prompt { fill: #3fb950; font-weight: bold; }
    .highlight { fill: #f0883e; }
  </style>
  <rect width="800" height="450" rx="8" class="bg"/>
  
  <!-- Mac window controls -->
  <circle cx="20" cy="20" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="20" r="6" fill="#27c93f"/>

  <g opacity="0">
    <text x="20" y="50" class="text"><tspan class="prompt">$</tspan> <tspan class="cmd">bash &lt;(curl -fsSL https://raw.github.../hades-hermes-agent/main/install.sh)</tspan></text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0; 0.000; 0.000; 1" dur="8.4s" repeatCount="indefinite" />
  </g>
  <g opacity="0">
    <text x="20" y="70" class="text">┌──────────────────────────────────────────────┐</text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0; 0.023; 0.024; 1" dur="8.4s" repeatCount="indefinite" />
  </g>
  <g opacity="0">
    <text x="20" y="90" class="text">│ HADES - Hermes Agent Docker Installer        │</text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0; 0.023; 0.024; 1" dur="8.4s" repeatCount="indefinite" />
  </g>
  <g opacity="0">
    <text x="20" y="110" class="text">└──────────────────────────────────────────────┘</text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0; 0.023; 0.024; 1" dur="8.4s" repeatCount="indefinite" />
  </g>
  <g opacity="0">
    <text x="20" y="130" class="text">Select AI Provider:</text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0; 0.047; 0.048; 1" dur="8.4s" repeatCount="indefinite" />
  </g>
  <g opacity="0">
    <text x="20" y="150" class="text">  1) openrouter    4) google</text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0; 0.047; 0.048; 1" dur="8.4s" repeatCount="indefinite" />
  </g>
  <g opacity="0">
    <text x="20" y="170" class="text">  2) anthropic     5) deepseek</text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0; 0.047; 0.048; 1" dur="8.4s" repeatCount="indefinite" />
  </g>
  <g opacity="0">
    <text x="20" y="190" class="text">  3) openai        6) custom</text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0; 0.047; 0.048; 1" dur="8.4s" repeatCount="indefinite" />
  </g>
  <g opacity="0">
    <text x="20" y="210" class="text"><tspan class="prompt">&gt;</tspan> <tspan class="highlight">1</tspan></text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0; 0.070; 0.071; 1" dur="8.4s" repeatCount="indefinite" />
  </g>
  <g opacity="0">
    <text x="20" y="230" class="text">Enter OPENROUTER_API_KEY:</text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0; 0.094; 0.095; 1" dur="8.4s" repeatCount="indefinite" />
  </g>
  <g opacity="0">
    <text x="20" y="250" class="text"><tspan class="prompt">&gt;</tspan> <tspan class="highlight">sk-or-v1-**********************************</tspan></text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0; 0.118; 0.119; 1" dur="8.4s" repeatCount="indefinite" />
  </g>
  <g opacity="0">
    <text x="20" y="270" class="text">Enter API port [8642]:</text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0; 0.142; 0.143; 1" dur="8.4s" repeatCount="indefinite" />
  </g>
  <g opacity="0">
    <text x="20" y="290" class="text"><tspan class="prompt">&gt;</tspan> <tspan class="highlight">8642</tspan></text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0; 0.166; 0.167; 1" dur="8.4s" repeatCount="indefinite" />
  </g>
  <g opacity="0">
    <text x="20" y="310" class="text">[+] Checking dependencies...</text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0; 0.189; 0.190; 1" dur="8.4s" repeatCount="indefinite" />
  </g>
  <g opacity="0">
    <text x="20" y="330" class="text">    Docker is running.</text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0; 0.213; 0.214; 1" dur="8.4s" repeatCount="indefinite" />
  </g>
  <g opacity="0">
    <text x="20" y="350" class="text">[+] Generating configurations...</text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0; 0.237; 0.238; 1" dur="8.4s" repeatCount="indefinite" />
  </g>
  <g opacity="0">
    <text x="20" y="370" class="text">    Created ~/.hades/.env</text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0; 0.261; 0.262; 1" dur="8.4s" repeatCount="indefinite" />
  </g>
  <g opacity="0">
    <text x="20" y="390" class="text">    Created ~/.hades/docker-compose.yml</text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0; 0.285; 0.286; 1" dur="8.4s" repeatCount="indefinite" />
  </g>
  <g opacity="0">
    <text x="20" y="410" class="text">[+] Building Docker image... (this may take a minute)</text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0; 0.309; 0.310; 1" dur="8.4s" repeatCount="indefinite" />
  </g>
  <g opacity="0">
    <text x="20" y="430" class="text">    =&gt; =&gt; naming to docker.io/library/hades</text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0; 0.380; 0.381; 1" dur="8.4s" repeatCount="indefinite" />
  </g>
  <g opacity="0">
    <text x="20" y="450" class="text">[+] Starting HADES container...</text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0; 0.404; 0.405; 1" dur="8.4s" repeatCount="indefinite" />
  </g>
  <g opacity="0">
    <text x="20" y="470" class="text">    Container hades-gateway-1  Started</text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0; 0.428; 0.429; 1" dur="8.4s" repeatCount="indefinite" />
  </g>
  <g opacity="0">
    <text x="20" y="490" class="text">[+] HADES is ready! API server listening on 127.0.0.1:8642</text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0; 0.451; 0.452; 1" dur="8.4s" repeatCount="indefinite" />
  </g>
  <g opacity="0">
    <text x="20" y="510" class="text">
$ hades cli</text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0; 0.499; 0.500; 1" dur="8.4s" repeatCount="indefinite" />
  </g>
  <g opacity="0">
    <text x="20" y="530" class="text">Connected to Hermes Agent.</text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0; 0.523; 0.524; 1" dur="8.4s" repeatCount="indefinite" />
  </g>
  <g opacity="0">
    <text x="20" y="550" class="text">Type '/help' for commands, or just chat.</text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0; 0.547; 0.548; 1" dur="8.4s" repeatCount="indefinite" />
  </g>
  <g opacity="0">
    <text x="20" y="570" class="text"><tspan class="prompt">&gt;</tspan> <tspan class="highlight">/status</tspan></text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0; 0.570; 0.571; 1" dur="8.4s" repeatCount="indefinite" />
  </g>
  <g opacity="0">
    <text x="20" y="590" class="text">Agent State: IDLE</text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0; 0.594; 0.595; 1" dur="8.4s" repeatCount="indefinite" />
  </g>
  <g opacity="0">
    <text x="20" y="610" class="text">Provider: openrouter | Model: deepseek/deepseek-v4-flash:free</text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0; 0.594; 0.595; 1" dur="8.4s" repeatCount="indefinite" />
  </g>
  <g opacity="0">
    <text x="20" y="630" class="text">
$ hades update</text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0; 0.642; 0.643; 1" dur="8.4s" repeatCount="indefinite" />
  </g>
  <g opacity="0">
    <text x="20" y="650" class="text">Pulling latest changes...</text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0; 0.666; 0.667; 1" dur="8.4s" repeatCount="indefinite" />
  </g>
  <g opacity="0">
    <text x="20" y="670" class="text">Rebuilding image...</text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0; 0.689; 0.690; 1" dur="8.4s" repeatCount="indefinite" />
  </g>
  <g opacity="0">
    <text x="20" y="690" class="text">Restarting container...</text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0; 0.713; 0.714; 1" dur="8.4s" repeatCount="indefinite" />
  </g>
  <g opacity="0">
    <text x="20" y="710" class="text">
$ hades url</text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0; 0.737; 0.738; 1" dur="8.4s" repeatCount="indefinite" />
  </g>
  <g opacity="0">
    <text x="20" y="730" class="text">http://127.0.0.1:8642</text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0; 0.761; 0.762; 1" dur="8.4s" repeatCount="indefinite" />
  </g>
</svg>